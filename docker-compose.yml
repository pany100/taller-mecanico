services:
  db:
    image: postgres:18
    container_name: taller_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - taller_pgdata:/var/lib/postgresql

volumes:
  taller_pgdata:
